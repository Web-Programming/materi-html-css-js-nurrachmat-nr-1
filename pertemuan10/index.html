<body>
    <h1>Ini Adalah Website yang Menggunakan JavaScript</h1>
    <div id="demo">....</div>
    <!-- Internal JS-->
    <script>
     // Output Document
     document.write("Hallo, nama saya " + nama);
     document.write("<p>Saya mahasiswa <b>Informatika</b><p>");
     
     // DOM (document object model)
     document.getElementById("demo").innerHTML = "<b>Selamat Datang di Kelas <i>IF2B</i><b>";
    </script>

    <hr/>
    <p>Masukkan Nama Anda : </p>
    <input type="text" id="txtnama"><button id="btnsimpan">Simpan</button>
    <br/>
    <div id="output"></div>
    <script>
        //ambil nilai/value element
        var isiDemo = document.getElementById("demo").outerText;
        console.log(isiDemo);
        var isiTxtNama = document.getElementById("txtnama").value;
        console.log(isiTxtNama);

        //event listener : keyup
        document.getElementById("txtnama").addEventListener("keyup", function(value){
            console.log(value.key);
        });

        //event klik (mouse click)
        document.getElementById("btnsimpan").addEventListener("click", function (params) {
            var isiTxtNama = document.getElementById("txtnama").value;
            document.getElementById("output").innerHTML = "<h4>Hallo "+isiTxtNama + ", Salam Kenal</h4";
            //document.write("<h4>Hallo "+isiTxtNama + ", Salam Kenal</h4");
        });
    </script>
